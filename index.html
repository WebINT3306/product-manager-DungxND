<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sản phẩm</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            cursor: pointer;
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .form-section {
            margin-bottom: 20px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="form-section">
        <h2>Thêm sản phẩm mới</h2>
        <input type="text" id="input-name" placeholder="Tên sản phẩm" />
        <input type="text" id="input-category" placeholder="Danh mục" />
        <input type="number" id="input-price" placeholder="Đơn giá" />
        <input type="number" id="input-quantity" placeholder="Số lượng" />
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <hr />

    <h2>Danh sách sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="name">Tên sản phẩm <span id="sort-indicator"></span></th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let productList = [];
        let isAscending = true;

        function loadProducts() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    productList = JSON.parse(xhr.responseText);
                    renderTable(productList);
                }
            };
            xhr.open("GET", "products.json");
            xhr.send();
        }

        function renderTable(data) {
            const tbody = document.querySelector("#product-table tbody");
            tbody.innerHTML = "";
            data.forEach((item, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>${item.price.toLocaleString()}</td>
                    <td>${item.quantity}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        document.getElementById("btn-add").addEventListener("click", function () {
            const name = document.getElementById("input-name").value.trim();
            const category = document.getElementById("input-category").value.trim();
            const price = parseFloat(document.getElementById("input-price").value);
            const quantity = parseInt(document.getElementById("input-quantity").value);

            if (name.length < 3 || isNaN(price) || price <= 0 || isNaN(quantity) || quantity < 1) {
                alert("Vui lòng nhập đúng định dạng!");
                return;
            }

            const newProduct = {
                name: name,
                category: category || "Chưa phân loại",
                price: price,
                quantity: quantity
            };

            productList.push(newProduct);
            renderTable(productList);

            document.getElementById("input-name").value = "";
            document.getElementById("input-category").value = "";
            document.getElementById("input-price").value = "";
            document.getElementById("input-quantity").value = "";
        });

        document.getElementById("name").addEventListener("click", function () {
            isAscending = !isAscending;
            productList.sort((a, b) => {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();
                if (isAscending) return nameA > nameB ? 1 : -1;
                return nameA < nameB ? 1 : -1;
            });
            document.getElementById("sort-indicator").innerText = isAscending ? "▲" : "▼";
            renderTable(productList);
        });

        window.onload = loadProducts;
    </script>
</body>

</html>

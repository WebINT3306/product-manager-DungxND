<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sản phẩm</title>
    <style></style>
</head>

<body>
    <h2>Thêm sản phẩm mới</h2>
    <div class="form-container">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" id="input-name" placeholder="Nhập tên sản phẩm..." />
        </div>
        <div class="form-group">
            <label>Danh mục:</label>
            <input type="text" id="input-category" placeholder="Nhập danh mục..." />
        </div>
        <div class="form-group">
            <label>Đơn giá:</label>
            <input type="number" id="input-price" placeholder="0" />
        </div>
        <div class="form-group">
            <label>Số lượng:</label>
            <input type="number" id="input-quantity" placeholder="0" />
        </div>
        <button id="btn-add">Thêm sản phẩm</button>
    </div>

    <hr />

    <h2>Danh sách sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th id="name">
                    Tên sản phẩm
                    <span class="sort-icon" id="sort-indicator"></span>
                </th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let productList = [];
        let isAscending = true;

        function loadProducts() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    productList = JSON.parse(xhr.responseText);
                    renderTable(productList);
                }
            };
            xhr.open("GET", "products.json");
            xhr.send();
        }

        function renderTable(data) {
            const tbody = document.querySelector("#product-table tbody");
            tbody.innerHTML = "";

            data.forEach((item, index) => {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td>${item.category}</td>
                        <td>${item.price.toLocaleString()}</td>
                        <td>${item.quantity}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        document
            .getElementById("btn-add")
            .addEventListener("click", function () {
                const name = document
                    .getElementById("input-name")
                    .value.trim();
                const category = document
                    .getElementById("input-category")
                    .value.trim();
                const price = parseFloat(
                    document.getElementById("input-price").value,
                );
                const quantity = parseInt(
                    document.getElementById("input-quantity").value,
                );

                if (name.length < 3) {
                    alert("Tên sản phẩm phải có ít nhất 3 ký tự!");
                    return;
                }
                if (isNaN(price) || price <= 0) {
                    alert("Đơn giá phải là số dương!");
                    return;
                }
                if (isNaN(quantity) || quantity < 1) {
                    alert("Số lượng phải lớn hơn hoặc bằng 1!");
                    return;
                }

                const newProduct = {
                    id: Date.now(),
                    name: name,
                    category: category || "Chưa phân loại",
                    price: price,
                    quantity: quantity,
                };

                productList.push(newProduct);
                renderTable(productList);

                document.getElementById("input-name").value = "";
                document.getElementById("input-category").value = "";
                document.getElementById("input-price").value = "";
                document.getElementById("input-quantity").value = "";
            });

        document
            .getElementById("name")
            .addEventListener("click", function () {
                isAscending = !isAscending;

                productList.sort((a, b) => {
                    const nameA = a.name.toLowerCase();
                    const nameB = b.name.toLowerCase();
                    if (isAscending) {
                        return nameA > nameB ? 1 : -1;
                    } else {
                        return nameA < nameB ? 1 : -1;
                    }
                });

                document.getElementById("sort-indicator").innerText =
                    isAscending ? "▲" : "▼";
                renderTable(productList);
            });

        window.onload = loadProducts;
    </script>
</body>

</html>
